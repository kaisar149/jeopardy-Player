<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Jeopardy - Moderator View</title>
    <link rel="stylesheet" href="moderator.css">
</head>
<body>

    <header>
        <h1>Moderator Dashboard</h1>
        <div class="setup-controls">
            <input type="file" id="game-file" accept=".json">
            <button id="open-player-window" onclick="window.open('player.html', '_blank')">1. Open Big Screen</button>
            <button id="btn-reset-game" style="background-color: #dc3545; margin-left: 10px;">Reset Game</button>
        </div>
    </header>

    <main>
        <section id="mini-board-container">
            <h2>Game Board</h2>
            <div id="mini-board"></div>
        </section>

        <section id="control-panel">
            <div class="panel-section" id="active-clue-details">
                <h2 id="current-category">Category - Point Value</h2>
                
                <div class="prompt-box">
                    <strong>Prompt (What the Audience Sees):</strong>
                    <p id="mod-prompt-text">Select a question from the board on the left.</p>
                    <div id="mod-media-container" style="margin-top: 15px;"></div>
                </div>
                
                <div class="response-box">
                    <strong>Response (The Correct Answer):</strong>
                    <p id="mod-response-text">...</p>
                </div>
                
                <div class="action-buttons">
                    <button id="btn-show-prompt">2. Show Prompt on Big Screen</button>
                    <button id="btn-show-answer">3. Reveal Answer on Big Screen</button>
                    <button id="btn-close-clue">4. Close Question & Return to Board</button>
                </div>
            </div>

            <div class="panel-section" id="final-jeopardy-controls">
                <h2 style="color: var(--neon-yellow);">Final Jeopardy</h2>
                <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
                    <input type="text" id="fj-category" placeholder="Enter Category" style="padding: 10px; background: #1a1a1a; color: white; border: 1px solid var(--border-color); border-radius: 6px;">
                    <textarea id="fj-prompt" placeholder="Enter Question" rows="3" style="padding: 10px; background: #1a1a1a; color: white; border: 1px solid var(--border-color); border-radius: 6px; font-family: 'Inter', sans-serif;"></textarea>
                    <textarea id="fj-answer" placeholder="Enter Answer" rows="2" style="padding: 10px; background: #1a1a1a; color: white; border: 1px solid var(--border-color); border-radius: 6px; font-family: 'Inter', sans-serif;"></textarea>

                    <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                        <label style="font-size: 0.9rem; color: var(--text-secondary); font-weight: bold;">Manual Wager Override:</label>
                        <input type="number" id="fj-wager-input" placeholder="0" style="padding: 6px; font-size: 1rem; background: #1a1a1a; color: white; border: 1px solid var(--neon-yellow); border-radius: 4px; width: 100px;">
                    </div>

                    <div class="action-buttons">
                        <button id="btn-fj-category" style="background-color: var(--jeopardy-blue);">1. Show Category (Wager Time)</button>
                        <button id="btn-fj-prompt" style="background-color: var(--accent-blue);">2. Show Question</button>
                        <button id="btn-fj-answer" style="background-color: var(--accent-green);">3. Reveal Answer</button>
                    </div>
                </div>
            </div>

            <div class="panel-section" id="timer-controls">
                <h2>Countdown Timer</h2>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="number" id="timer-input" value="30" style="width: 60px; padding: 6px; background: #1a1a1a; color: white; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem;">
                        <span style="color: var(--text-secondary); font-weight: bold;">Secs</span>
                    </div>
                    <div id="mod-timer-display" style="font-size: 2rem; color: var(--neon-yellow); font-weight: 900;">30</div>
                </div>
                <div class="action-buttons" style="flex-direction: row; margin-top: 15px; display: flex; gap: 10px;">
                    <button id="btn-start-timer" style="background-color: var(--accent-green); flex: 1;">Start</button>
                    <button id="btn-stop-timer" style="background-color: var(--accent-red); flex: 1;">Stop</button>
                    <button id="btn-reset-timer" style="background-color: #555; flex: 1;">Reset</button>
                </div>
            </div>

            <div class="panel-section" id="buzzer-controls">
                <h2>Buzzer Order</h2>
                <ul id="buzzer-list" style="list-style: none; padding: 0; margin: 15px 0; font-size: 1.2rem; min-height: 50px; background: #1a1a1a; border-radius: 6px; padding: 10px;">
                    <li style="color: #666; font-style: italic;">No buzzes yet.</li>
                </ul>
                <div class="action-buttons">
                    <button id="btn-clear-buzzers" style="background-color: var(--accent-red);">Clear Buzzers & Re-Enable</button>
                </div>
            </div>

            <div class="panel-section" id="team-scores">
                <h2>Teams & Scores</h2>
                
                <div class="team">
                    <input type="text" value="Team 1">
                    <div class="score-controls">
                        <button class="minus">-</button>
                        <span class="score">0</span>
                        <button class="plus">+</button>
                        <button class="remove-team" title="Remove Team">✖</button>
                    </div>
                </div>

                <div class="team">
                    <input type="text" value="Team 2">
                    <div class="score-controls">
                        <button class="minus">-</button>
                        <span class="score">0</span>
                        <button class="plus">+</button>
                        <button class="remove-team" title="Remove Team">✖</button>
                    </div>
                </div>
                
                <div class="team">
                    <input type="text" value="Team 3">
                    <div class="score-controls">
                        <button class="minus">-</button>
                        <span class="score">0</span>
                        <button class="plus">+</button>
                        <button class="remove-team" title="Remove Team">✖</button>
                    </div>
                </div>

                <button id="btn-add-team" style="width: 100%; margin-top: 15px; background-color: #28a745;">+ Add New Team</button>
            </div>
        </section>
    </main>

    <script src="moderator.js"></script>
</body>
</html>
